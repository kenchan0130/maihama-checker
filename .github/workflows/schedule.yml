name: schedule
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  restaurant:
    # メンテ中のため一時停止
    if: false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        url:
          - 'https://reserve.tokyodisneyresort.jp/sp/restaurant/list/?useDate=20251001&mealDivInform=3&adultNum=4&childNum=2&childAgeInform=03%7C04%7C&restaurantTypeInform=&restaurantNameCd=RCPR0&wheelchairCount=0&stretcherCount=0&showWay=&reservationStatus=&beforeUrl=&wayBack='
          - 'https://reserve.tokyodisneyresort.jp/sp/restaurant/list/?useDate=20251001&mealDivInform=3&adultNum=2&childNum=1&childAgeInform=03%7C&restaurantTypeInform=&restaurantNameCd=RCPR0&wheelchairCount=0&stretcherCount=0&showWay=&reservationStatus=&beforeUrl=&wayBack='
          # - 'https://reserve.tokyodisneyresort.jp/sp/showrestaurant/list/?useDate=20250721&adultNum=2&childNum=1&childAgeInform=03%7C&parkDiv=4&restaurantNameCd=&wheelchairCount=0&stretcherCount=0&showWay=&reservationStatus=1&wayBack='
    steps:
      - uses: actions/checkout@v5
      - name: setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Cache node modules
        id: npm-cache
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: |
            node_modules
            ~/.cache
            ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
      - name: install dependencies
        if: ${{ steps.npm-cache.outputs.cache-hit != 'true' }}
        run: npm ci
      - name: run script
        run: npm run restaurant
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TARGET_URL: ${{ matrix.url }}
          REJECT_LIST: "シャーウッドガーデン・レストラン,ハイピリオン・ラウンジ,イーストサイド･カフェ,れすとらん北齋,エンパイア・グリル,カンナ,センターストリート ･ コーヒーハウス,ドリーマーズ・ラウンジ（ワンス・アポン・ア・ドリームセット限定）"
  ticket:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # ダンス・ザ・グローブ！ 7/8
          - month: 7
            day: 8
            show: DTG
          # ドリームス・テイク・フライト（7月の全日をチェック）
          - month: 7
            day: ''
            show: DTF
    steps:
      - uses: actions/checkout@v5
      - name: setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: run script
        run: npm run ticket
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MONTH: ${{ matrix.month }}
          DAY: ${{ matrix.day }}
          SHOW: ${{ matrix.show }}
